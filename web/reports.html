<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspection Reports — Admin Panel</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="sidebar">
      <h2>Admin Panel</h2>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="reports.html" class="active">📋 Inspection Reports</a>
      <a href="feedback.html">💬 User Feedback</a>
      <a href="#" onclick="logout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-right: 6px; opacity: 0.8;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Logout</a>
    </div>

    <div class="content">
      <h1>Inspection Reports</h1>

      <!-- Summary cards -->
      <div class="summary-cards">
        <div class="summary-card">
          <div class="label">Total</div>
          <div class="value" id="countTotal">—</div>
        </div>
        <div class="summary-card">
          <div class="label">Pending</div>
          <div class="value" id="countPending">—</div>
        </div>
        <div class="summary-card">
          <div class="label">Resolved</div>
          <div class="value" id="countResolved">—</div>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">
          All
        </button>
        <button class="filter-tab" onclick="setFilter('pending', this)">
          Pending
        </button>
        <button class="filter-tab" onclick="setFilter('resolved', this)">
          Resolved
        </button>
      </div>

      <!-- Search -->
      <div class="toolbar">
        <input
          class="search-box"
          type="text"
          placeholder="🔍 Search by email, category or description…"
          oninput="applyFilters()"
          id="searchInput"
        />
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Category</th>
              <th>Description</th>
              <th>Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="reportsTable"></tbody>
        </table>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="auth-guard.js"></script>
    <script src="reports.js"></script>
  </body>
</html>
