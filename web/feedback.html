<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Feedback — Admin Panel</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .filter-tabs {
        display: flex;
        gap: 4px;
        background: rgba(0, 0, 0, 0.18);
        border-radius: 10px;
        padding: 4px;
        width: fit-content;
        margin-bottom: 20px;
      }
      .filter-tab {
        padding: 7px 18px;
        border: none;
        border-radius: 7px;
        background: transparent;
        color: rgba(255, 255, 255, 0.65);
        font-size: 0.84rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.18s;
      }
      .filter-tab:hover {
        color: #fff;
      }
      .filter-tab.active {
        background: #8b5cf6;
        color: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }

      .msg-preview {
        max-width: 260px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
        color: #a5b4fc;
        font-size: 0.9rem;
        transition: color 0.15s;
      }
      .msg-preview:hover {
        color: #c4b5fd;
        text-decoration: underline;
      }
      .msg-short {
        color: var(--text-main);
        cursor: default;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(4px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }

      .modal-box {
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 28px 32px;
        max-width: 520px;
        width: 90%;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        position: relative;
      }
      .modal-label {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 10px;
      }
      .modal-user {
        font-size: 0.95rem;
        font-weight: 600;
        color: #f8fafc;
        margin-bottom: 2px;
      }
      .modal-email {
        font-size: 0.8rem;
        color: #94a3b8;
        margin-bottom: 18px;
      }
      .modal-message {
        font-size: 0.95rem;
        line-height: 1.7;
        color: #e2e8f0;
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 18px;
        max-height: 300px;
        overflow-y: auto;
      }
      .modal-date {
        font-size: 0.78rem;
        color: #64748b;
      }
      .modal-close {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        color: #94a3b8;
        border-radius: 8px;
        width: 32px;
        height: 32px;
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .modal-close:hover {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h2>Admin Panel</h2>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="feedback.html" class="active">💬 User Feedback</a>
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>

    <div class="content">
      <h1>User Feedback</h1>

      <div class="summary-cards">
        <div class="summary-card">
          <div class="label">Total</div>
          <div class="value" id="countTotal">—</div>
        </div>
        <div class="summary-card">
          <div class="label">Pending</div>
          <div class="value" id="countPending">—</div>
        </div>
        <div class="summary-card">
          <div class="label">Resolved</div>
          <div class="value" id="countResolved">—</div>
        </div>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">
          All
        </button>
        <button class="filter-tab" onclick="setFilter('pending', this)">
          Pending
        </button>
        <button class="filter-tab" onclick="setFilter('resolved', this)">
          Resolved
        </button>
      </div>

      <div class="toolbar">
        <input
          class="search-box"
          type="text"
          placeholder="🔍 Search by user, email or message…"
          oninput="applyFilters()"
          id="searchInput"
        />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Message</th>
              <th>Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="feedbackTable">
            <tr>
              <td
                colspan="5"
                style="text-align: center; padding: 36px; color: #64748b"
              >
                Loading feedback…
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Message detail modal -->
    <div class="modal-overlay" id="msgModal" onclick="closeModal(event)">
      <div class="modal-box">
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
        <div class="modal-label">Full Message</div>
        <div class="modal-user" id="modalUser"></div>
        <div class="modal-email" id="modalEmail"></div>
        <div class="modal-message" id="modalMessage"></div>
        <div class="modal-date" id="modalDate"></div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="auth-guard.js"></script>
    <script src="feedback.js"></script>
  </body>
</html>
